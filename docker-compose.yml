version: "3.9"

networks:
  bookstore-network:
    driver: bridge

services:
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "${INVENTORY_PORT:-3000}:3000"
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "${ORDER_PORT:-3001}:3001"
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "${PAYMENT_PORT:-3002}:3002"
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT:-9001}:9001"
    depends_on:
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/inventory"]
      interval: 15s
      timeout: 5s
      retries: 3

  bookstore-web-app:
    build: ./bookstore-web-app
    container_name: bookstore-web-app
    ports:
      - "${WEBAPP_PORT:-8082}:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mongo-data:
